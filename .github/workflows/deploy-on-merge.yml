name: Deploy Fix on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'k8s/order-service.yaml'
      - 'services/order-service/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-fix:
    # Fire on any merged PR that touches order-service code or manifest
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Guard — only deploy if the fix is in place (BUG_ENABLED absent or false)
        id: guard
        run: |
          if ! grep -q 'name: BUG_ENABLED' k8s/order-service.yaml; then
            echo "BUG_ENABLED not present in manifest (fix removed it) — proceeding with deploy"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif grep -A1 'name: BUG_ENABLED' k8s/order-service.yaml | grep -q 'value: "false"'; then
            echo "BUG_ENABLED=false confirmed in manifest — proceeding with deploy"
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "BUG_ENABLED is still true in manifest — skipping deploy"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up kubectl
        if: steps.guard.outputs.should_deploy == 'true'
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: steps.guard.outputs.should_deploy == 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply manifest (source of truth)
        if: steps.guard.outputs.should_deploy == 'true'
        run: kubectl apply -f k8s/order-service.yaml

      - name: Stamp service.version and force rollout to pull latest image
        if: steps.guard.outputs.should_deploy == 'true'
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          kubectl set env deployment/order-service -n grafana-demo \
            SERVICE_VERSION="${SHORT_SHA}-fix"
          kubectl rollout restart deployment/order-service -n grafana-demo

      - name: Wait for rollout
        if: steps.guard.outputs.should_deploy == 'true'
        run: kubectl rollout status deployment/order-service -n grafana-demo --timeout=180s

      - name: Verify fix is live
        if: steps.guard.outputs.should_deploy == 'true'
        run: |
          POD=$(kubectl get pod -n grafana-demo -l app=order-service -o jsonpath='{.items[0].metadata.name}')
          echo "Running pod: $POD"
          kubectl exec -n grafana-demo "$POD" -- env | grep -E "BUG_ENABLED|SERVICE_VERSION" || echo "(BUG_ENABLED removed — expected after fix)"

      - name: Post Grafana annotation — fix deployed
        if: steps.guard.outputs.should_deploy == 'true'
        continue-on-error: true
        env:
          GRAFANA_SA_TOKEN: ${{ secrets.GRAFANA_SA_TOKEN }}
        run: |
          if [ -z "${GRAFANA_SA_TOKEN:-}" ]; then
            echo "GRAFANA_SA_TOKEN secret not set — skipping annotation"
            exit 0
          fi
          SHORT_SHA="${GITHUB_SHA::7}"
          NOW_MS="$(date +%s)000"
          curl -sf -X POST \
            -H "Authorization: Bearer $GRAFANA_SA_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"dashboardUID\":\"order-service-n-plus-one-demo\",\"tags\":[\"demo\",\"fix\"],\"text\":\"Fix deployed — service.version=${SHORT_SHA}-fix (PR #${{ github.event.pull_request.number }})\",\"time\":${NOW_MS}}" \
            "https://albertito.grafana.net/api/annotations" \
            && echo "Grafana annotation posted." || echo "Annotation failed (non-fatal)"

      - name: Comment on PR
        if: steps.guard.outputs.should_deploy == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Fix deployed to production** — manifest applied + new `service.version` stamped. Latency should drop from ~950ms to ~100ms. Check App Observability to compare `service.version` before/after.'
            })
