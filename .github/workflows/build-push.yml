name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend-api
            type: microservice
            dockerfile: services/frontend-api/Dockerfile
          - service: order-service
            type: microservice
            dockerfile: services/order-service/Dockerfile
          - service: inventory-service
            type: microservice
            dockerfile: services/inventory-service/Dockerfile
          - service: load-generator
            type: loadgen
            context: load-generator

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.service }} (microservice)
        if: matrix.type == 'microservice'
        uses: docker/build-push-action@v6
        with:
          context: services
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          build-args: GIT_SHA=${{ env.SHORT_SHA }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Build and push ${{ matrix.service }} (load-generator)
        if: matrix.type == 'loadgen'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Make package public
        run: |
          # Repo name is the second segment of github.repository (owner/repo)
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          for svc in frontend-api order-service inventory-service load-generator; do
            gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${REPO_NAME}%2F${svc}" \
              -f visibility=public 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

